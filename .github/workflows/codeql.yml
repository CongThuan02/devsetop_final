name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '30 5 * * 1'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        # CodeQL không hỗ trợ Dart, nên SAST cho Dart code do `flutter analyze`
        # và Semgrep phụ trách (xem security.yml). CodeQL ở đây quét GitHub
        # Actions workflows để phát hiện script injection / unsafe expressions.
        # File Kotlin của Android chỉ là 5 dòng wrapper FlutterActivity, không
        # chứa business logic nên không scan.
        include:
          - language: actions
            build-mode: none
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
