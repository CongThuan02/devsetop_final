name: Deploy Web to Firebase

on:
  push:
    branches: [main]

concurrency:
  group: firebase-hosting-live
  cancel-in-progress: true

jobs:
  deploy:
    name: Build Flutter Web & Deploy Live
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install FVM
        run: dart pub global activate fvm

      - name: Add pub cache to PATH
        run: echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"

      - name: Install Flutter from FVM config
        run: fvm install

      - name: Show Flutter version
        run: fvm flutter --version

      - name: Install dependencies
        run: fvm flutter pub get

      - name: Check Firebase deploy credentials
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "::error::FIREBASE_SERVICE_ACCOUNT is not set in GitHub Secrets"
            exit 1
          fi

      - name: Build web (release)
        run: fvm flutter build web --release

      - name: Deploy live (main)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: pwmgr-devsecops
          channelId: live
