name: Deploy Web to Firebase

on:
  push:
    branches: [main]

concurrency:
  group: firebase-hosting-live
  cancel-in-progress: true

jobs:
  deploy:
    name: Build Flutter Web & Deploy Live
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install FVM
        run: dart pub global activate fvm

      - name: Add pub cache to PATH
        run: echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"

      - name: Install Flutter from FVM config
        run: fvm install

      - name: Show Flutter version
        run: fvm flutter --version

      - name: Install dependencies
        run: fvm flutter pub get

      - name: Check required secrets
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_WEB_API_KEY: ${{ secrets.FIREBASE_WEB_API_KEY }}
          FIREBASE_WEB_APP_ID: ${{ secrets.FIREBASE_WEB_APP_ID }}
        run: |
          missing=0
          for name in \
            FIREBASE_PROJECT_ID \
            FIREBASE_SERVICE_ACCOUNT \
            FIREBASE_MESSAGING_SENDER_ID \
            FIREBASE_AUTH_DOMAIN \
            FIREBASE_STORAGE_BUCKET \
            FIREBASE_WEB_API_KEY \
            FIREBASE_WEB_APP_ID
          do
            if [ -z "${!name}" ]; then
              echo "::error::$name is not set in GitHub Secrets"
              missing=1
            fi
          done
          exit "$missing"

      - name: Build web (release)
        run: >
          fvm flutter build web --release
          --dart-define=FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
          --dart-define=FIREBASE_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          --dart-define=FIREBASE_AUTH_DOMAIN=${{ secrets.FIREBASE_AUTH_DOMAIN }}
          --dart-define=FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_STORAGE_BUCKET }}
          --dart-define=FIREBASE_WEB_API_KEY=${{ secrets.FIREBASE_WEB_API_KEY }}
          --dart-define=FIREBASE_WEB_APP_ID=${{ secrets.FIREBASE_WEB_APP_ID }}

      - name: Deploy live (main)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}
          channelId: live
