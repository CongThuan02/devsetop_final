name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  flutter:
    name: Lint, Test, Build Web
    runs-on: ubuntu-latest
    environment: devsecop
    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install FVM
        run: dart pub global activate fvm

      - name: Add pub cache to PATH
        run: echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"

      - name: Install Flutter from FVM config
        run: fvm install

      - name: Show Flutter version
        run: fvm flutter --version

      - name: Install dependencies
        run: fvm flutter pub get

      - name: Verify formatting
        run: fvm dart format --set-exit-if-changed .

      - name: Static analysis
        run: fvm flutter analyze

      - name: Unit tests
        run: fvm flutter test --coverage

      - name: Build web (release)
        run: fvm flutter build web --release

      - name: Upload web bundle
        uses: actions/upload-artifact@v7
        with:
          name: web-build
          path: build/web
          retention-days: 7
